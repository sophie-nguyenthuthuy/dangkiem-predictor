name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  node:
    name: Node (lint, typecheck, test, build)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dangkiem
          POSTGRES_PASSWORD: dangkiem_test
          POSTGRES_DB: dangkiem_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dangkiem"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://dangkiem:dangkiem_test@localhost:5432/dangkiem_test?schema=public
      JWT_SECRET: ci-test-secret
      PREDICTOR_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @dangkiem/api prisma generate
      - run: pnpm --filter @dangkiem/api prisma migrate deploy
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  python:
    name: Python (predictor)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/predictor

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -e ".[dev]"
      - run: ruff check app tests
      - run: pytest -q
